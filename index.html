<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>e KAJIAN TINDAKAN</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        navy: {
                            900: '#061024',
                            800: '#0B1B3D',
                            700: '#152C5B'
                        },
                        gold: {
                            400: '#E5C05C',
                            500: '#D4AF37',
                            600: '#B5952F'
                        }
                    },
                    fontFamily: {
                        serif: ['"Playfair Display"', 'serif'],
                        sans: ['Inter', 'sans-serif']
                    }
                }
            }
        }
    </script>

    <style>
        body {
            background-color: #0B1B3D;
            color: #ffffff;
        }
        
        .gold-3d {
            color: #D4AF37;
            text-shadow: 1px 1px 0px #b5952f, 2px 2px 0px #8a7122, 3px 3px 4px rgba(0,0,0,0.5);
        }

        .flip-r {
            display: inline-block;
            transform: scaleX(-1);
        }

        .glass-card {
            background: rgba(21, 44, 91, 0.6);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(212, 175, 55, 0.3);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        .input-field {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(212, 175, 55, 0.5);
            color: white;
            transition: all 0.3s ease;
        }
        .input-field:focus {
            outline: none;
            border-color: #D4AF37;
            background: rgba(255, 255, 255, 0.1);
        }
        
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #061024; }
        ::-webkit-scrollbar-thumb { background: #D4AF37; border-radius: 4px; }
    </style>
</head>
<body class="font-sans antialiased min-h-screen">

    <header class="pt-16 pb-10 px-4 text-center">
        <div class="flex flex-col items-center justify-center mb-6">
            <div class="text-7xl font-serif gold-3d flex items-center tracking-tighter">
                <span>R</span><span class="flip-r">R</span>
            </div>
            <div class="text-white text-sm tracking-[0.3em] uppercase mt-2 border-t border-gold-500 pt-1">Innovation</div>
            <div class="text-gold-500 font-bold mt-4 tracking-widest text-lg">FORWARD TOGETHER</div>
        </div>

        <h1 class="text-4xl md:text-6xl font-serif text-gold-500 mt-8 mb-4">e KAJIAN TINDAKAN</h1>
        <p class="text-lg md:text-xl text-gray-300 italic max-w-2xl mx-auto font-light">"Jana idea kajian tindakan secara automatik menggunakan kata kunci"</p>
    </header>

    <main class="container mx-auto px-4 pb-20 max-w-6xl">
        <section class="glass-card rounded-2xl p-6 md:p-10 mb-12">
            <h2 class="text-2xl font-serif text-gold-500 mb-6 border-b border-gold-500/30 pb-2">
                <i class="fas fa-edit mr-2"></i> Parameter Kajian
            </h2>
            
            <form id="kajianForm" class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="flex flex-col space-y-2">
                    <label class="text-sm font-semibold text-gold-400">1. Isu / Masalah Murid</label>
                    <input type="text" id="isu" placeholder="Cth: Sukar mengingat fakta sejarah" class="input-field rounded-lg p-3 w-full" required>
                </div>
                <div class="flex flex-col space-y-2">
                    <label class="text-sm font-semibold text-gold-400">2. Mata Pelajaran / Bidang</label>
                    <input type="text" id="subjek" placeholder="Cth: Sejarah" class="input-field rounded-lg p-3 w-full" required>
                </div>
                <div class="flex flex-col space-y-2">
                    <label class="text-sm font-semibold text-gold-400">3. Tahap Murid</label>
                    <input type="text" id="tahap" placeholder="Cth: Tahun 5 / Tingkatan 3" class="input-field rounded-lg p-3 w-full" required>
                </div>
                <div class="flex flex-col space-y-2">
                    <label class="text-sm font-semibold text-gold-400">4. Objektif Kajian</label>
                    <input type="text" id="objektif" placeholder="Cth: Meningkatkan daya ingatan murid" class="input-field rounded-lg p-3 w-full" required>
                </div>
            </form>

            <div class="mt-10 flex flex-wrap justify-center gap-4">
                <button onclick="generateIdea()" class="bg-gold-500 hover:bg-gold-600 text-navy-900 font-bold py-3 px-6 rounded-lg transition-all duration-300">✨ JANA IDEA KAJIAN</button>
                <button onclick="resetForm()" class="bg-transparent border border-gray-400 hover:border-white text-gray-300 py-3 px-6 rounded-lg transition-all duration-300">🔄 RESET</button>
                <button onclick="downloadOutput()" class="bg-navy-700 border border-gold-500/50 text-gold-400 py-3 px-6 rounded-lg transition-all duration-300">⬇️ DOWNLOAD</button>
                <button onclick="copyAIPrompt()" class="bg-purple-600 hover:bg-purple-500 text-white font-semibold py-3 px-6 rounded-lg transition-all duration-300">🤖 AI PROMPT</button>
            </div>
        </section>

        <section id="outputSection" class="hidden">
            <h2 class="text-3xl font-serif text-center text-gold-500 mb-10"><i class="fas fa-lightbulb mr-2"></i> Cadangan Idea</h2>
            <div id="cardsContainer" class="grid grid-cols-1 lg:grid-cols-3 gap-8"></div>
        </section>
    </main>

    <div id="toast" class="fixed bottom-5 right-5 bg-green-500 text-white px-6 py-3 rounded-lg shadow-xl translate-y-20 opacity-0 transition-all duration-300"></div>

    <script>
        function showToast(msg) {
            const t = document.getElementById('toast');
            t.innerText = msg;
            t.classList.remove('translate-y-20', 'opacity-0');
            setTimeout(() => t.classList.add('translate-y-20', 'opacity-0'), 3000);
        }

        function generateIdea() {
            const isu = document.getElementById('isu').value;
            const subjek = document.getElementById('subjek').value;
            const tahap = document.getElementById('tahap').value;
            const objektif = document.getElementById('objektif').value;
            if(!isu || !subjek || !tahap || !objektif) return showToast("Sila isi semua ruang!");

            const container = document.getElementById('cardsContainer');
            container.innerHTML = '';
            const ideas = ["Gamifikasi", "Visual-Mnemonic", "Koperatif"];
            
            ideas.forEach((type, i) => {
                const card = document.createElement('div');
                card.className = "glass-card rounded-xl p-6 space-y-3";
                card.innerHTML = `<h3 class="text-gold-500 font-bold border-b border-gold-500/20 pb-2">${type}</h3>
                                  <p class="text-sm"><strong class="text-gold-400">Tajuk:</strong> Meningkatkan ${isu} melalui ${type} bagi murid ${tahap}.</p>
                                  <p class="text-sm"><strong class="text-gold-400">Objektif:</strong> ${objektif}.</p>
                                  <p class="text-sm"><strong class="text-gold-400">Metodologi:</strong> Model Kemmis & McTaggart.</p>`;
                container.appendChild(card);
            });
            document.getElementById('outputSection').classList.remove('hidden');
            showToast("Idea berjaya dijana!");
        }

        function resetForm() { document.getElementById('kajianForm').reset(); document.getElementById('outputSection').classList.add('hidden'); }
        function copyAIPrompt() { navigator.clipboard.writeText("Jana idea kajian tindakan untuk " + document.getElementById('isu').value); showToast("Prompt disalin!"); }
        function downloadOutput() { showToast("Muat turun bermula..."); }
    </script>
</body>
</html>
