<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>e KAJIAN TINDAKAN</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body{
    background: linear-gradient(135deg,#081b3a,#102b5f);
    min-height:100vh;
}

.glass{
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(12px);
    border:1px solid rgba(255,255,255,0.15);
}

.card-hover{
    transition:0.4s;
}

.card-hover:hover{
    transform:translateY(-5px);
    box-shadow:0 20px 40px rgba(0,0,0,0.25);
}

.fade-in{
    animation:fade .7s ease;
}

@keyframes fade{
from{
opacity:0;
transform:translateY(20px);
}
to{
opacity:1;
transform:translateY(0);
}
}

.gold-text{
color:#D4AF37;
}
</style>
</head>

<body class="text-white">

<!-- HERO -->
<section class="text-center py-16 px-6">

<h1 class="text-5xl md:text-6xl font-extrabold gold-text mb-4">
e KAJIAN TINDAKAN
</h1>

<p class="text-xl max-w-3xl mx-auto text-gray-200">
Jana idea kajian tindakan secara automatik menggunakan kata kunci.
</p>

</section>

<!-- FORM -->
<section class="max-w-5xl mx-auto px-5">

<div class="glass rounded-3xl p-8 shadow-2xl">

<h2 class="text-3xl font-bold mb-8 text-center">
Maklumat Kajian
</h2>

<div class="grid md:grid-cols-2 gap-6">

<div>
<label class="block mb-2 font-semibold">
📌 Isu / Masalah Murid
</label>
<input
id="isu"
type="text"
placeholder="Contoh: Tidak mengenal huruf"
class="w-full p-4 rounded-xl text-black">
</div>

<div>
<label class="block mb-2 font-semibold">
📚 Mata Pelajaran / Bidang
</label>
<input
id="mata"
type="text"
placeholder="Contoh: Bahasa Melayu"
class="w-full p-4 rounded-xl text-black">
</div>

<div>
<label class="block mb-2 font-semibold">
👨‍🎓 Tahap Murid
</label>
<input
id="tahap"
type="text"
placeholder="Contoh: Tahun 2"
class="w-full p-4 rounded-xl text-black">
</div>

<div>
<label class="block mb-2 font-semibold">
🔍 Kata Kunci Tambahan
</label>
<input
id="kata"
type="text"
placeholder="Contoh: Didik Hibur"
class="w-full p-4 rounded-xl text-black">
</div>

</div>

<div class="flex flex-wrap justify-center gap-4 mt-10">

<button
onclick="janaIdea()"
class="bg-yellow-500 hover:bg-yellow-400 text-black font-bold px-8 py-4 rounded-xl transition">
✨ JANA IDEA KAJIAN
</button>

<button
onclick="resetForm()"
class="bg-red-500 hover:bg-red-400 px-8 py-4 rounded-xl font-bold">
↺ Reset
</button>

</div>

</div>

</section>

<!-- OUTPUT -->
<section class="max-w-6xl mx-auto px-5 py-14">

<div id="output" class="grid gap-8 md:grid-cols-3"></div>

</section>


<script>

function janaIdea(){

let isu=document.getElementById('isu').value;
let mata=document.getElementById('mata').value;
let tahap=document.getElementById('tahap').value;
let kata=document.getElementById('kata').value;

if(isu==="" || mata===""){
alert("Sila lengkapkan maklumat utama.");
return;
}

let output=document.getElementById('output');
output.innerHTML="";

const intervensi=[
"Kit Pembelajaran Interaktif",
"Permainan Didik Hibur Digital",
"Kad Imbas Pintar",
"Modul Pembelajaran Berasaskan Permainan",
"Aplikasi Gamifikasi"
];

const metodologi=[
"Model Kajian Tindakan Kemmis dan McTaggart melibatkan perancangan, tindakan, pemerhatian dan refleksi.",
"Pendekatan gelung kajian tindakan dua kitaran.",
"Reka bentuk kajian tindakan berasaskan intervensi bilik darjah."
];

const instrumen=[
"Ujian pra dan pasca, pemerhatian dan senarai semak.",
"Soal selidik, analisis dokumen dan temu bual.",
"Rekod pemerhatian, lembaran kerja dan refleksi murid."
];

for(let i=1;i<=3;i++){

let inter=intervensi[Math.floor(Math.random()*intervensi.length)];
let metod=metodologi[Math.floor(Math.random()*metodologi.length)];
let inst=instrumen[Math.floor(Math.random()*instrumen.length)];

let card=`
<div class="glass rounded-3xl p-7 card-hover fade-in">

<h3 class="text-2xl font-bold gold-text mb-4">
Cadangan ${i}
</h3>

<div class="space-y-4 text-sm leading-7">

<p><b>📖 Tajuk Kajian:</b><br>
Keberkesanan ${inter} dalam Mengatasi Masalah "${isu}" dalam Kalangan Murid ${tahap} bagi Mata Pelajaran ${mata}.
</p>

<p><b>⚠️ Masalah Kajian:</b><br>
Murid ${tahap} didapati mengalami masalah ${isu} yang menjejaskan pencapaian dalam ${mata}.
</p>

<p><b>💡 Pencetus Idea:</b><br>
Pemerhatian guru menunjukkan murid kurang menguasai kemahiran berkaitan ${isu}. Pendekatan ${kata || "berpusatkan murid"} dicadangkan.
</p>

<p><b>🎯 Objektif Kajian:</b><br>
Meningkatkan penguasaan murid terhadap kemahiran berkaitan ${isu}.
</p>

<p><b>❓ Persoalan Kajian:</b><br>
Adakah penggunaan ${inter} dapat meningkatkan penguasaan murid?
</p>

<p><b>🚀 Cadangan Intervensi / Inovasi:</b><br>
${inter}
</p>

<p><b>🔬 Metodologi Ringkas:</b><br>
${metod}
</p>

<p><b>📝 Instrumen Cadangan:</b><br>
${inst}
</p>

<p><b>🏆 Cadangan Tajuk Inovasi:</b><br>
"${kata || "SMART"}-${i} : Inovasi ${inter}"
</p>

</div>

</div>
`;

output.innerHTML += card;

}

window.scrollTo({
top:output.offsetTop-80,
behavior:"smooth"
});

}

function resetForm(){

document.getElementById('isu').value="";
document.getElementById('mata').value="";
document.getElementById('tahap').value="";
document.getElementById('kata').value="";

document.getElementById('output').innerHTML="";

}

</script>

</body>
</html>
